<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Squid Game Landing Page</title>

  <link rel="stylesheet" href="style.css" />

  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
    rel="stylesheet"
  />
</head>
<body>

  <main class="page">

    <header class="navbar">
      <div class="small-logo">
        SQUID<br>
        <span>GAME</span>
      </div>

      <nav>
        <a href="#">About</a>
        <a href="#" class="active">Watch now</a>
        <a href="#">Actors</a>
        <a href="#">Contact</a>
      </nav>

      <i class="ri-menu-3-line menu"></i>
    </header>

    <section class="hero">

      <div class="left-content">
        <h1>
          <span>SQUID</span>
          <span>GAME</span>
        </h1>

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">
          <button class="play-btn">
            <i class="ri-play-fill"></i>
            Play Now
          </button>

          <button class="trailer-btn">
            <i class="ri-play-mini-line"></i>
            Watch Trailer
          </button>
        </div>
      </div>

      <div class="scroll">
        <p>SCROLL</p>
        <span></span>
      </div>

      <img
        class="guard-img"
        src="https://images.unsplash.com/photo-1608889825103-eb5ed706fc64?auto=format&fit=crop&w=700&q=80"
        alt="Squid Game Guard"
      />

      <div class="social">
        <i class="ri-twitter-line"></i>
        <i class="ri-instagram-line"></i>
        <i class="ri-facebook-fill"></i>
      </div>

      <h2 class="bg-game">GAME</h2>
      <h2 class="bg-squid">SQUID</h2>

    </section>

    <section class="videos">

      <div class="video-card">
        <img
          src="https://images.unsplash.com/photo-1608889825103-eb5ed706fc64?auto=format&fit=crop&w=500&q=70"
          alt="Video"
        />
        <button><i class="ri-play-fill"></i></button>
      </div>

      <div class="video-card">
        <img
          src="https://images.unsplash.com/photo-1608889825103-eb5ed706fc64?auto=format&fit=crop&w=500&q=70"
          alt="Video"
        />
        <button><i class="ri-play-fill"></i></button>
      </div>

      <div class="video-card">
        <img
          src="https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=500&q=70"
          alt="Video"
        />
        <button><i class="ri-play-fill"></i></button>
      </div>

    </section>

  </main>

</body>
</html>
